<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معناو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('conact.jpeg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 500px;
        }

        .contact-card h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .contact-card p {
            color: #ddd;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .social-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .social-item {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            transition: 0.3s all ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
        }

        .social-item i {
            font-size: 2rem;
            color: #fff;
        }

        .social-item:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            border-color: #a68b5a;
        }

        .whatsapp:hover i { color: #25D366; }
        .facebook:hover i { color: #1877F2; }
        .instagram:hover i { color: #E4405F; }
        .gmail:hover i { color: #DB4437; }

        .social-item span {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .social-links { grid-template-columns: 1fr; }
            .contact-card { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <h1>تواصلوا معنا</h1>
        <p>يسعدنا دائماً الرد على استفساراتكم</p>

        <div class="social-links">
            <a href="https://wa.me/201279150169" class="social-item whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>

            <a href="https://www.facebook.com/share/1Fq7W9HJzy/" class="social-item facebook" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <span>Facebook</span>
            </a>

            <a href="https://www.instagram.com/tafaseel.6862792?igsh=MWdyamZjdmViazZvcA==" class="social-item instagram" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>

            <a href="mailto:omda93017@gmail.com" class="social-item gmail">
                <i class="fas fa-envelope"></i>
                <span>Gmail</span>
            </a>
        </div>
    </div>

</body>
</html>
